<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>📊 Dashboard Sales SlsReport</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  body{ background:#f1f5f9 }
  .card{ background:#fff; border-radius:12px; box-shadow:0 1px 3px #0001 }
  .hijau{ background:#dcfce7; color:#14532d }
  .kuning{ background:#fef3c7; color:#78350f }
  .merah{ background:#fee2e2; color:#7f1d1d }
</style>
</head>
<body class="p-3">
<div class="max-w-5xl mx-auto space-y-4">

  <div class="card p-4">
    <h1 class="text-xl font-bold">📊 Dashboard Penjualan</h1>
    <p id="infoUser" class="text-sm text-slate-500">Memuat…</p>
  </div>

  <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="kartu"></div>

  <div class="card p-4">
    <h3 class="font-bold mb-2">🏆 Pencapaian Tiap Toko (%)</h3>
    <canvas height="240" id="grafik"></canvas>
  </div>

  <div class="card p-4">
    <h3 class="font-bold mb-2">🚨 Toko Di Bawah 90%</h3>
    <div id="daftarAlert" class="space-y-2"></div>
  </div>

  <div class="card p-4 overflow-x-auto">
    <h3 class="font-bold mb-2">🏪 Daftar Lengkap & Ranking</h3>
    <table class="w-full text-sm">
      <thead class="bg-slate-100"><tr>
        <th class="p-2 text-left">#</th>
        <th class="p-2 text-left">KDTK</th><th>Nama</th><th>AM</th>
        <th class="text-right">SPD</th><th class="text-right">Target</th>
        <th class="text-right">Ach %</th><th>Status</th>
      </tr></thead>
      <tbody id="tabelToko"></tbody>
    </table>
  </div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();

// ==== BLOKIR SELAIN ADMIN ====
const ADMIN_ID = 993046873;
const u = tg.initDataUnsafe?.user || {};
if(Number(u.id) !== ADMIN_ID){
  document.body.innerHTML = '<div class="p-10 text-center text-red-600 font-bold">⛔ Khusus Admin</div>';
  throw new Error("Ditolak");
}
document.getElementById("infoUser").textContent = "✅ " + (u.first_name||"Admin");

// ==== AMBIL DATA DARI URL ====
const q = new URLSearchParams(location.search);
let D = { ranking:[], totalStore:0, totalSales:0, over:0, under:0, avgSpd:0, achArea:0 };
(D.ranking||[]).forEach((r,i)=>{
  let [warna,cls] = r.p>=100?["🟢","hijau"]:r.p>=90?["🟡","kuning"]:["🔴","merah"];
  ht += `<tr class="border-t">
    <td class="p-2">${i+1}</td>
    <td class="p-2 font-semibold">${r.k}</td>
    <td>${r.n}</td><td>${r.a}</td>
    <td class="text-right">${Rp(r.s)}</td>
    <td class="text-right">${Rp(r.t)}</td>
    <td class="text-right font-bold">${r.p}%</td>
    <td><span class="px-2 rounded text-xs ${cls}">${warna}</span></td></tr>`;
  if(r.p<90) ha += `<div class="p-2 rounded merah">🔴 <b>${r.k}</b> — ${r.p}% | SPD ${Rp(r.s)}</div>`;
});


const Rp = n => "Rp " + Number(n||0).toLocaleString("id-ID");

// ==== KARTU RINGKASAN ====
document.getElementById("kartu").innerHTML = `
  <div class="card p-3"><div class="text-xs text-slate-500">Total Toko</div><div class="text-xl font-bold">${D.totalStore}</div></div>
  <div class="card p-3"><div class="text-xs">Sales Akumulasi</div><div class="text-xl font-bold">${Rp(D.totalSales)}</div></div>
  <div class="card p-3"><div class="text-xs">Rata‑rata SPD</div><div class="text-xl font-bold">${Rp(D.avgSpd)}</div></div>
  <div class="card p-3"><div class="text-xs">Ach Area</div><div class="text-xl font-bold">${D.achArea}%</div></div>
  <div class="card p-3 hijau"><div class="text-xs">🟢 Over</div><div class="text-xl font-bold">${D.over}</div></div>
  <div class="card p-3 merah"><div class="text-xs">🔴 Under</div><div class="text-xl font-bold">${D.under}</div></div>`;

// ==== GRAFIK ====
const R = (D.ranking||[]).slice(0,15);
new Chart(document.getElementById("grafik"),{
  type:"bar",
  data:{
    labels: R.map(r=>r.kdtk),
    datasets:[{ label:"Ach %", data:R.map(r=>r.ach),
      backgroundColor: R.map(r=>r.ach>=100?"#22c55e":r.ach>=90?"#eab308":"#ef4444") }]
  },
  options:{ indexAxis:"y", scales:{x:{beginAtZero:true,max:130}} }
});

// ==== TABEL & ALERT ====
let ht="", ha="";
(D.ranking||[]).forEach((r,i)=>{
  let [warna,cls] = r.ach>=100?["🟢","hijau"]:r.ach>=90?["🟡","kuning"]:["🔴","merah"];
  ht += `<tr class="border-t">
    <td class="p-2">${i+1}</td>
    <td class="p-2 font-semibold">${r.kdtk}</td>
    <td>${r.nama||"-"}</td><td>${r.am||"-"}</td>
    <td class="text-right">${Rp(r.spd)}</td>
    <td class="text-right">${Rp(r.target)}</td>
    <td class="text-right font-bold">${r.ach}%</td>
    <td><span class="px-2 rounded text-xs ${cls}">${warna}</span></td></tr>`;
  if(r.ach<90) ha += `<div class="p-2 rounded merah">🔴 <b>${r.kdtk}</b> — ${r.ach}% | SPD ${Rp(r.spd)} / ${Rp(r.target)}</div>`;
});
document.getElementById("tabelToko").innerHTML = ht || '<tr><td colspan=8 class="p-4 text-center text-slate-400">Belum ada data</td></tr>';
document.getElementById("daftarAlert").innerHTML = ha || '<div class="hijau p-2 rounded">🟢 SEMUA TOKO DI ATAS 90%</div>';
</script>
</body>
</html>
